<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-lang-key="title"></title>
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>

  <body>
    <div class="circle" id="introCircle">
      <div class="title-main" data-lang-key="title"></div>
      <div class="description" data-lang-key="desc"></div>
      <button id="startBtn" class="startBtn-1" data-lang-key="click"></button>
    </div>

    <div class="main">
      <div class="home-button home-btn">
        <img src="./assets/images/home-btn.png" alt="" />
      </div>

      <div class="page-title">
        <span data-lang-key="title"></span>
      </div>

      <!-- nav-container -->
      <div class="language-container">
        <div class="english active">E</div>
        <div class="hindi">H</div>
        <div class="gujrati">G</div>
      </div>

      <div class="topics">
        <a href="home.html" class="topic topic-1">
          <div class="num num-1" data-lang-key="num-1"></div>
          <span data-lang-key="topic-1"></span>
          <img src="./assets/images/topic-1.png" alt="" />
        </a>

        <a href="general.html" class="topic topic-2">
          <div class="num num-2" data-lang-key="num-2"></div>
          <span data-lang-key="topic-2"></span>
          <img src="./assets/images/topic-2.png" alt="" />
        </a>

        <a href="upashray.html" class="topic topic-3">
          <div class="num num-3" data-lang-key="num-3"></div>
          <span data-lang-key="topic-3"></span>
          <img src="./assets/images/topic-3.png" alt="" />
        </a>

        <a href="pathshala.html" class="topic topic-4">
          <div class="num num-4" data-lang-key="num-4"></div>
          <span data-lang-key="topic-4"></span>
          <img src="./assets/images/topic-4.png" alt="" />
        </a>
      </div>
    </div>

    <script src="./assets/js/app.js"></script>

    <script>
    const introCircle = document.getElementById("introCircle");
const main = document.querySelector(".main");
const startBtn = document.getElementById("startBtn");
const homeBtn = document.querySelector(".home-btn");
const description = document.querySelector(".description");

const englishBtn = document.querySelector(".english");
const hindiBtn = document.querySelector(".hindi");
const gujratiBtn = document.querySelector(".gujrati");

const transitionAudio = new Audio("./assets/audio/transition/2.mp3");

const englishAudio = new Audio("./assets/audio/Eng.mpeg");
const hindiAudio = new Audio("./assets/audio/Hin.mpeg");
const gujratiAudio = new Audio("./assets/audio/Guj.mpeg");

const homeAudio = new Audio("./assets/audio/pop.mp3");

// Topic click audio
const topicAudio = new Audio("./assets/audio/topic_home-btn_back-btn/7.mp3");

const allAudios = [
  transitionAudio,
  englishAudio,
  hindiAudio,
  gujratiAudio,
  homeAudio,
  topicAudio,
];

allAudios.forEach((audio) => {
  audio.preload = "auto";
});

function playAudio(audio) {
  if (!audio) return;

  try {
    allAudios.forEach((item) => {
      if (item !== audio) {
        item.pause();
        item.currentTime = 0;
      }
    });

    audio.pause();
    audio.currentTime = 0;

    audio.play().catch((error) => {
      console.log("Audio play blocked or failed:", error);
    });
  } catch (error) {
    console.log("Audio play error:", error);
  }
}

function startIntro() {
  introCircle.style.display = "flex";
  introCircle.style.opacity = "1";
  introCircle.style.pointerEvents = "auto";

  introCircle.classList.remove("expand");
  main.classList.remove("show");

  void introCircle.offsetWidth;
  void main.offsetWidth;

  introCircle.classList.add("expand");

  setTimeout(() => {
    main.classList.add("show");
  }, 250);

  setTimeout(() => {
    introCircle.style.display = "none";
  }, 1300);
}

// Start button click
startBtn?.addEventListener("click", () => {
  if (description) {
    description.style.display = "none";
  }

  playAudio(transitionAudio);
  startIntro();
});

// Language button audio
englishBtn?.addEventListener("click", () => {
  playAudio(englishAudio);
});

hindiBtn?.addEventListener("click", () => {
  playAudio(hindiAudio);
});

gujratiBtn?.addEventListener("click", () => {
  playAudio(gujratiAudio);
});

// Home button click
homeBtn?.addEventListener("click", (e) => {
  e.preventDefault();

  playAudio(homeAudio);

  main.classList.remove("show");

  if (description) {
    description.style.display = "block";
  }

  introCircle.style.display = "flex";
  introCircle.style.opacity = "1";
  introCircle.style.pointerEvents = "auto";
  introCircle.classList.remove("expand");

  void introCircle.offsetWidth;
  void main.offsetWidth;
});

// Topic click audio + page redirect
document.querySelectorAll(".topic").forEach((topic) => {
  topic.addEventListener("click", function (e) {
    e.preventDefault();

    const link = this.getAttribute("href");

    playAudio(topicAudio);

    setTimeout(() => {
      window.location.href = link;
    }, 700);
  });
});
    </script>
  </body>
</html>
